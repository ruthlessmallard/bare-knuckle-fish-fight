name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - run: flutter pub get
      - run: flutter build web --release
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
